name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: AgentLamp-windows-amd64
            artifact_path: bin/AgentLamp.exe
            build_cmd: build
          - os: macos-latest
            artifact_name: AgentLamp-macos-arm64
            # v0.1 mac 暂只发裸二进制, 用户自己 chmod +x 后跑;
            # .app bundle 留 v0.2 加签名/notarize 流程后再发
            artifact_path: bin/AgentLamp
            build_cmd: build
          - os: ubuntu-latest
            artifact_name: AgentLamp-linux-amd64
            artifact_path: bin/AgentLamp
            build_cmd: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # GTK 头文件必须在 wails3 CLI 安装之前就位, 否则 go install 编译失败.
      # 包列表与 Wails 官方 CI 对齐: libgtk-4-dev libwebkitgtk-6.0-dev + 周边依赖
      - name: Install Linux deps (GTK4 + WebKitGTK 6.0)
        if: startsWith(matrix.os, 'ubuntu')
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev libwayland-dev build-essential pkg-config
          version: agentlamp-1.0

      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.96

      - name: Add Go bin to PATH (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Add Go bin to PATH (Unix)
        if: matrix.os != 'windows-latest'
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: wails3 doctor
        run: wails3 doctor
        continue-on-error: true

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Generate Wails bindings
        run: wails3 generate bindings -ts -clean=true

      - name: Build
        run: wails3 ${{ matrix.build_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Release on tag
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release archives
        run: |
          set -e
          cd artifacts
          for d in */; do
            name="${d%/}"
            (cd "$name" && zip -r "../${name}.zip" .)
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
